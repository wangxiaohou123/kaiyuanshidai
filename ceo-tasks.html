<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>开元时代 · CEO 专属任务区</title>
<style>
  :root{
    --bg:#0E0F11;--dark-2:#16181C;--dark-3:#1E2128;--dark-4:#232730;
    --gold:#C9A84C;--red:#FF6B6B;--green:#2ED573;--blue:#576CBC;--purple:#B580E8;--orange:#FF9F43;
    --muted:#8B92A0;--border:rgba(255,255,255,0.07);--text:#E8EAF0;
    --shadow:0 4px 24px rgba(0,0,0,0.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;padding:0 0 100px;}

  /* ── Hero ── */
  .hero{
    background:linear-gradient(135deg,#100E00 0%,#160F00 50%,#0E0F11 100%);
    border-bottom:1px solid rgba(201,168,76,0.25);
    padding:2.2rem 2rem 1.8rem;position:relative;overflow:hidden;
  }
  .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(201,168,76,0.12),transparent);pointer-events:none;}
  .hero-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;}
  .hero-left .eyebrow{font-size:0.7rem;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:0.5rem;}
  .hero-left h1{font-size:clamp(1.3rem,3.5vw,2rem);font-weight:800;color:#fff;}
  .hero-left .sub{font-size:0.83rem;color:var(--muted);margin-top:0.4rem;}
  .hero-stats{display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-end;}
  .stat{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:0.6rem 1rem;text-align:center;}
  .stat-num{font-size:1.3rem;font-weight:800;}
  .stat-label{font-size:0.65rem;color:var(--muted);}
  .hero-notice{margin-top:1rem;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.25);border-radius:10px;padding:0.7rem 1rem;font-size:0.8rem;color:#ddc879;display:flex;gap:0.5rem;align-items:center;}

  /* ── 布局 ── */
  .container{max-width:1100px;margin:0 auto;padding:1.8rem 1.5rem;}
  .sec-title{font-size:0.68rem;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:0.6rem;}
  .sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

  /* ── 过滤栏 ── */
  .filter-bar{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.5rem;}
  .filter-btn{padding:0.35rem 0.9rem;border-radius:20px;font-size:0.75rem;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;}
  .filter-btn:hover{border-color:rgba(201,168,76,0.4);color:var(--text);}
  .filter-btn.active{background:rgba(201,168,76,0.15);border-color:rgba(201,168,76,0.5);color:var(--gold);}
  .filter-btn.f-red.active{background:rgba(255,107,107,0.15);border-color:rgba(255,107,107,0.5);color:#FF6B6B;}
  .filter-btn.f-green.active{background:rgba(46,213,115,0.15);border-color:rgba(46,213,115,0.5);color:#2ED573;}
  .filter-btn.f-blue.active{background:rgba(87,108,188,0.15);border-color:rgba(87,108,188,0.5);color:#576CBC;}

  /* ── 任务卡片 ── */
  .task-grid{display:flex;flex-direction:column;gap:1rem;}
  .task-card{
    background:var(--dark-2);border-radius:16px;overflow:hidden;
    border:1px solid var(--border);transition:border-color .2s,box-shadow .2s;
  }
  .task-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.3);}
  .task-card.status-done{opacity:0.55;}
  .task-card.status-done .task-hd{border-left-color:#2ED573 !important;}

  .task-hd{padding:1rem 1.2rem;border-left:4px solid transparent;display:flex;gap:1rem;align-items:flex-start;cursor:pointer;}
  .task-hd:hover{background:rgba(255,255,255,0.02);}

  .task-left{flex:1}
  .task-meta{display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;margin-bottom:0.45rem;}
  .tag{display:inline-flex;align-items:center;gap:0.2rem;padding:0.15rem 0.5rem;border-radius:4px;font-size:0.65rem;font-weight:700;letter-spacing:0.5px;}
  .tag-p0{background:rgba(255,107,107,0.15);color:#FF6B6B;border:1px solid rgba(255,107,107,0.3);}
  .tag-p1{background:rgba(201,168,76,0.15);color:#C9A84C;border:1px solid rgba(201,168,76,0.3);}
  .tag-done{background:rgba(46,213,115,0.15);color:#2ED573;border:1px solid rgba(46,213,115,0.3);}
  .tag-type{background:rgba(255,255,255,0.06);color:var(--muted);border:1px solid var(--border);}
  .tag-time{background:rgba(87,108,188,0.1);color:#7B93D8;border:1px solid rgba(87,108,188,0.2);font-weight:500;}

  .task-title{font-size:0.95rem;font-weight:700;margin-bottom:0.25rem;}
  .task-desc{font-size:0.8rem;color:var(--muted);line-height:1.5;}

  .task-right{display:flex;flex-direction:column;align-items:flex-end;gap:0.4rem;flex-shrink:0;}
  .status-dot{width:10px;height:10px;border-radius:50%;}
  .s-todo{background:#FF6B6B;box-shadow:0 0 6px rgba(255,107,107,0.5);}
  .s-inprog{background:#C9A84C;box-shadow:0 0 6px rgba(201,168,76,0.5);}
  .s-done{background:#2ED573;box-shadow:0 0 6px rgba(46,213,115,0.5);}
  .toggle-arrow{font-size:0.7rem;color:var(--muted);transition:transform .2s;margin-top:0.2rem;}

  .task-body{display:none;border-top:1px solid var(--border);}
  .task-body.open{display:block;}

  /* ── 任务详情区 ── */
  .task-detail{padding:1.2rem;display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;}
  @media(max-width:640px){.task-detail{grid-template-columns:1fr;}}

  .detail-sec h4{font-size:0.72rem;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:0.6rem;}
  .detail-sec ul{list-style:none;padding:0;font-size:0.82rem;line-height:1.9;}
  .detail-sec ul li::before{content:"›  ";color:var(--gold);}
  .detail-sec p{font-size:0.82rem;line-height:1.6;color:var(--muted);}

  /* ── 反馈区 ── */
  .feedback-area{padding:1.2rem;border-top:1px solid var(--border);background:rgba(201,168,76,0.03);}
  .feedback-area h4{font-size:0.72rem;letter-spacing:1px;color:var(--gold);text-transform:uppercase;margin-bottom:0.8rem;display:flex;align-items:center;gap:0.4rem;}
  .feedback-area h4::after{content:'← 王总填写';font-size:0.65rem;color:var(--muted);letter-spacing:0;}

  .feedback-form{display:flex;flex-direction:column;gap:0.7rem;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;}
  @media(max-width:500px){.form-row{grid-template-columns:1fr;}}

  .form-group{display:flex;flex-direction:column;gap:0.3rem;}
  .form-label{font-size:0.7rem;color:var(--muted);letter-spacing:0.5px;}
  .form-select,.form-input,.form-textarea{
    background:var(--dark-4);border:1px solid var(--border);border-radius:8px;
    color:var(--text);font-size:0.82rem;padding:0.5rem 0.7rem;
    font-family:inherit;outline:none;transition:border-color .15s;
    -webkit-appearance:none;
  }
  .form-select:focus,.form-input:focus,.form-textarea:focus{border-color:rgba(201,168,76,0.5);}
  .form-textarea{resize:vertical;min-height:70px;line-height:1.5;}
  .form-select option{background:#1E2128;}

  .saved-feedback{background:var(--dark-3);border:1px solid var(--border);border-radius:8px;padding:0.7rem 0.9rem;font-size:0.8rem;line-height:1.6;margin-bottom:0.7rem;display:none;}
  .saved-feedback.visible{display:block;}
  .saved-feedback .sf-label{font-size:0.65rem;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:0.3rem;}
  .saved-feedback .sf-time{font-size:0.65rem;color:var(--muted);float:right;}

  .btn-row{display:flex;gap:0.5rem;justify-content:flex-end;}
  .btn{padding:0.45rem 1rem;border-radius:8px;font-size:0.78rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit;}
  .btn-save{background:rgba(201,168,76,0.2);color:#C9A84C;border:1px solid rgba(201,168,76,0.4);}
  .btn-save:hover{background:rgba(201,168,76,0.3);}
  .btn-done{background:rgba(46,213,115,0.2);color:#2ED573;border:1px solid rgba(46,213,115,0.4);}
  .btn-done:hover{background:rgba(46,213,115,0.3);}
  .btn-clear{background:transparent;color:var(--muted);border:1px solid var(--border);}
  .btn-clear:hover{color:var(--text);}

  .save-confirm{font-size:0.72rem;color:var(--green);margin-left:auto;opacity:0;transition:opacity .3s;}

  /* ── 空状态 ── */
  .empty-state{text-align:center;padding:3rem;color:var(--muted);font-size:0.85rem;}

  /* ── 时间线标记 ── */
  .timeline-label{font-size:0.68rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:0.4rem 0;margin-bottom:0.3rem;}

  /* ── 底部 ── */
  .footer{text-align:center;color:var(--muted);font-size:0.75rem;padding-top:2rem;border-top:1px solid var(--border);}

  /* ── 进度条 ── */
  .progress-bar-wrap{background:rgba(255,255,255,0.06);border-radius:4px;height:6px;overflow:hidden;margin-top:0.5rem;}
  .progress-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#C9A84C,#E8D06A);transition:width .4s;}
</style>
</head>
<body>

<!-- ── Hero ── -->
<div class="hero">
  <div class="hero-top">
    <div class="hero-left">
      <div class="eyebrow">开元时代 · 人机协作系统</div>
      <h1>王总专属任务区</h1>
      <p class="sub">只有需要王总亲自决策或行动的事项才会出现在这里 · 班子可自主完成的任务不会打扰你</p>
    </div>
    <div class="hero-stats">
      <div class="stat"><div class="stat-num" id="stat-total" style="color:#C9A84C;">—</div><div class="stat-label">总任务</div></div>
      <div class="stat"><div class="stat-num" id="stat-p0" style="color:#FF6B6B;">—</div><div class="stat-label">P0 紧急</div></div>
      <div class="stat"><div class="stat-num" id="stat-done" style="color:#2ED573;">—</div><div class="stat-label">已完成</div></div>
    </div>
  </div>
  <div class="hero-notice">
    💡 <span>填写反馈后点击「保存反馈」→ 小美下次启动时自动读取并推进后续工作</span>
  </div>
  <!-- 整体进度 -->
  <div style="margin-top:1rem;">
    <div style="display:flex;justify-content:space-between;font-size:0.72rem;color:var(--muted);margin-bottom:0.3rem;">
      <span>储备期整体完成度</span>
      <span id="progress-pct">—</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
</div>

<div class="container">

  <!-- 过滤栏 -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterTasks('all',this)">全部</button>
    <button class="filter-btn f-red" onclick="filterTasks('p0',this)">🚨 P0 紧急</button>
    <button class="filter-btn f-blue" onclick="filterTasks('p1',this)">📋 P1 重要</button>
    <button class="filter-btn" onclick="filterTasks('人脉',this)">🤝 人脉激活</button>
    <button class="filter-btn" onclick="filterTasks('政务',this)">🏛️ 政务确认</button>
    <button class="filter-btn" onclick="filterTasks('决策',this)">⚖️ 战略决策</button>
    <button class="filter-btn f-green" onclick="filterTasks('done',this)">✅ 已完成</button>
  </div>

  <!-- 任务区域 -->
  <div id="task-container" class="task-grid"></div>

  <div class="footer">
    <p>开元时代 AI 工作台 · 小美搭档自动维护 · 王总填写反馈后自动同步</p>
    <p style="margin-top:0.4rem;">
      <a href="index.html" style="color:var(--gold);text-decoration:none;">← 返回总指挥台</a>
      &nbsp;·&nbsp;
      <a href="weekend-kit.html" style="color:var(--green);text-decoration:none;">周末行动包 →</a>
    </p>
  </div>
</div>

<script>

  },

  {
    id: "T006",
    priority: "p1",
    type: "人脉",
    timeline: "本月",
    timeHint: "2026-03月底前（参考）",
    title: "识别并接触1位"顾问级人物"——养老政策或医疗背景",
    desc: "班子需要一位对北京西城区养老政策有深入了解的外部顾问，用于快速核实政策细节、引荐政府关系。你的人脉网络中是否有符合条件的人？",
    why: "政府对接（C05）需要"达科长级以上"的引荐，纯冷启动成功率低。有一个内线大幅提速。",
    howto: [
      "画像：民政系统/社区街道/养老机构/医院社工方向",
      "可以是退休的政府人员、做养老研究的高校教授、NGO负责人",
      "不需要立刻签协议，先看是否有这样的人存在于你的一度二度人脉中",
    ],
    feedbackFields: [
      { key:"exist", label:"是否有候选人", type:"select", options:["暂无线索","有1-2个候选","已有明确人选","不清楚，需要想想"] },
      { key:"profile", label:"候选人简述（可选）", type:"textarea", placeholder:"例：前西城区民政局XX处，现退休，认识XX" },
      { key:"note", label:"其他想法", type:"textarea", placeholder:"" },
    ]
  },

  // ══ 持续跟踪 ══
  {
    id: "T007",
    priority: "p1",
    type: "决策",
    timeline: "持续",
    timeHint: "每周五回顾",
    title: "每周五 · P0进度校准（30分钟）",
    desc: "每周五花30分钟看一眼官网工作台的P0状态，确认E05/E06/C05的推进情况，决定下周优先级是否需要调整。这是开元治理体系运转的发动机。",
    why: "王总是唯一能解锁P0阻塞项的人，班子每周都在等待确认信号。",
    howto: [
      "打开 index.html 的P0进度区",
      "看：哪个P0项本周有进展？哪个还卡着？",
      "做：用本页面的反馈区填写1-2句话更新，小美推进对应任务",
      "下周的优先级班子会自动重新排列",
    ],
    feedbackFields: [
      { key:"week", label:"本次周期（可填日期）", type:"input", placeholder:"例：2026-03-14 周" },
      { key:"p0status", label:"本周P0进展", type:"textarea", placeholder:"E05：已打电话确认\nE06：登记了2户\nC05：家人已帮忙问了" },
      { key:"block", label:"有卡点或需要班子协助的事", type:"textarea", placeholder:"例：电话打了但对方说要找别的部门，不知道下一步" },
    ]
  },

];

// ─────────────────────────────────────────────
// 核心渲染逻辑
// ─────────────────────────────────────────────
const STORAGE_KEY = 'kaiyuan_ceo_tasks_v2';

function loadState(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); }
  catch(e){ return {}; }
}
function saveState(s){ localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

let state = loadState();
let currentFilter = 'all';

function renderTasks(filter){
  currentFilter = filter;
  const container = document.getElementById('task-container');
  container.innerHTML = '';

  const timelineGroups = {};
  TASKS.forEach(t => {
    if(!timelineGroups[t.timeline]) timelineGroups[t.timeline] = [];
    timelineGroups[t.timeline].push(t);
  });

  const order = ['本周末','下周一','本月','持续'];

  let totalDone = 0, totalP0 = 0, filteredCount = 0;
  TASKS.forEach(t => {
    const s = state[t.id]||{};
    if(s.done) totalDone++;
    if(t.priority === 'p0') totalP0++;
  });
  document.getElementById('stat-total').textContent = TASKS.length;
  document.getElementById('stat-p0').textContent = totalP0;
  document.getElementById('stat-done').textContent = totalDone;
  const pct = Math.round(totalDone/TASKS.length*100);
  document.getElementById('progress-pct').textContent = pct+'%';
  document.getElementById('progress-fill').style.width = pct+'%';

  order.forEach(tl => {
    const group = timelineGroups[tl];
    if(!group) return;

    const filtered = group.filter(t => {
      const s = state[t.id]||{};
      if(filter === 'all') return true;
      if(filter === 'done') return s.done;
      if(filter === 'p0') return t.priority === 'p0' && !s.done;
      if(filter === 'p1') return t.priority === 'p1' && !s.done;
      return t.type === filter && !s.done;
    });
    if(filtered.length === 0) return;

    const tlLabel = document.createElement('div');
    tlLabel.className = 'timeline-label';
    tlLabel.textContent = '📅 ' + tl;
    container.appendChild(tlLabel);

    filtered.forEach(t => {
      filteredCount++;
      container.appendChild(buildCard(t));
    });
  });

  if(filteredCount === 0){
    container.innerHTML = '<div class="empty-state">🎉 此分类下暂无待处理任务</div>';
  }
}

function buildCard(task){
  const s = state[task.id] || {};
  const isDone = !!s.done;

  const card = document.createElement('div');
  card.className = 'task-card' + (isDone ? ' status-done' : '');
  card.id = 'card-' + task.id;

  const borderColor = task.priority === 'p0' ? '#FF6B6B' : '#C9A84C';

  // 头部
  const hd = document.createElement('div');
  hd.className = 'task-hd';
  hd.style.borderLeftColor = isDone ? '#2ED573' : borderColor;
  hd.onclick = () => toggleBody(task.id);

  const left = document.createElement('div');
  left.className = 'task-left';

  const meta = document.createElement('div');
  meta.className = 'task-meta';
  meta.innerHTML = `
    <span class="tag ${isDone?'tag-done':task.priority==='p0'?'tag-p0':'tag-p1'}">${isDone?'✅ 完成':task.priority==='p0'?'🚨 P0':'📋 P1'}</span>
    <span class="tag tag-type">${task.type}</span>
    <span class="tag tag-time">⏰ ${task.timeHint}</span>
  `;
  left.appendChild(meta);

  const title = document.createElement('div');
  title.className = 'task-title';
  title.textContent = task.title;
  left.appendChild(title);

  const desc = document.createElement('div');
  desc.className = 'task-desc';
  desc.textContent = task.desc;
  left.appendChild(desc);

  hd.appendChild(left);

  const right = document.createElement('div');
  right.className = 'task-right';
  right.innerHTML = `<div class="status-dot ${isDone?'s-done':task.priority==='p0'?'s-todo':'s-inprog'}"></div><div class="toggle-arrow">▼</div>`;
  hd.appendChild(right);
  card.appendChild(hd);

  // 展开体
  const body = document.createElement('div');
  body.className = 'task-body';
  body.id = 'body-' + task.id;

  // 详情
  const detail = document.createElement('div');
  detail.className = 'task-detail';

  const secWhy = document.createElement('div');
  secWhy.className = 'detail-sec';
  secWhy.innerHTML = `<h4>为什么重要</h4><p>${task.why}</p>`;
  detail.appendChild(secWhy);

  const secHow = document.createElement('div');
  secHow.className = 'detail-sec';
  secHow.innerHTML = `<h4>怎么做</h4><ul>${task.howto.map(h=>`<li>${h}</li>`).join('')}</ul>`;
  detail.appendChild(secHow);

  body.appendChild(detail);

  // 已保存反馈展示
  const savedEl = document.createElement('div');
  savedEl.className = 'saved-feedback' + (s.savedAt ? ' visible':'');
  savedEl.id = 'saved-' + task.id;
  if(s.savedAt){
    savedEl.innerHTML = buildSavedHtml(task, s);
  }

  // 反馈区
  const fbArea = document.createElement('div');
  fbArea.className = 'feedback-area';
  fbArea.innerHTML = `<h4>填写反馈</h4>`;
  fbArea.appendChild(savedEl);

  const form = document.createElement('div');
  form.className = 'feedback-form';

  task.feedbackFields.forEach(f => {
    const g = document.createElement('div');
    g.className = 'form-group';
    g.innerHTML = `<label class="form-label">${f.label}</label>`;
    let input;
    if(f.type === 'select'){
      input = document.createElement('select');
      input.className = 'form-select';
      f.options.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o; opt.textContent = o;
        if(s[f.key] === o) opt.selected = true;
        input.appendChild(opt);
      });
    } else if(f.type === 'textarea'){
      input = document.createElement('textarea');
      input.className = 'form-textarea';
      input.placeholder = f.placeholder || '';
      input.value = s[f.key] || '';
    } else {
      input = document.createElement('input');
      input.className = 'form-input';
      input.type = 'text';
      input.placeholder = f.placeholder || '';
      input.value = s[f.key] || '';
    }
    input.id = `f-${task.id}-${f.key}`;
    g.appendChild(input);
    form.appendChild(g);
  });

  fbArea.appendChild(form);

  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';
  btnRow.style.marginTop = '0.8rem';
  btnRow.innerHTML = `
    <span class="save-confirm" id="confirm-${task.id}">✓ 已保存</span>
    <button class="btn btn-clear" onclick="clearFeedback('${task.id}')">清空</button>
    <button class="btn btn-save" onclick="saveFeedback('${task.id}')">保存反馈</button>
    <button class="btn btn-done" onclick="markDone('${task.id}')">${isDone?'取消完成':'✅ 标记完成'}</button>
  `;
  fbArea.appendChild(btnRow);
  body.appendChild(fbArea);
  card.appendChild(body);

  return card;
}

function buildSavedHtml(task, s){
  const lines = task.feedbackFields.map(f => {
    const val = s[f.key];
    if(!val || val === f.options?.[0]) return null;
    return `<div><strong style="color:var(--gold)">${f.label}：</strong>${val}</div>`;
  }).filter(Boolean).join('');
  return `<div class="sf-label">上次反馈 <span class="sf-time">${s.savedAt||''}</span></div>${lines}`;
}

function toggleBody(id){
  const body = document.getElementById('body-'+id);
  const arrow = document.querySelector('#card-'+id+' .toggle-arrow');
  if(body.classList.contains('open')){
    body.classList.remove('open');
    if(arrow) arrow.style.transform='';
  } else {
    body.classList.add('open');
    if(arrow) arrow.style.transform='rotate(180deg)';
  }
}

function saveFeedback(taskId){
  const task = TASKS.find(t=>t.id===taskId);
  if(!task) return;
  const s = state[taskId] || {};
  task.feedbackFields.forEach(f => {
    const el = document.getElementById(`f-${taskId}-${f.key}`);
    if(el) s[f.key] = el.value;
  });
  s.savedAt = new Date().toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  state[taskId] = s;
  saveState(state);

  // 更新已保存展示
  const savedEl = document.getElementById('saved-'+taskId);
  if(savedEl){
    savedEl.innerHTML = buildSavedHtml(task, s);
    savedEl.classList.add('visible');
  }

  // 提示
  const confirm = document.getElementById('confirm-'+taskId);
  if(confirm){ confirm.style.opacity='1'; setTimeout(()=>confirm.style.opacity='0',2000); }

  // 同步到commands.md
  syncToCommands(taskId, task, s);
}

function clearFeedback(taskId){
  if(!confirm('确定清空此任务的反馈？')) return;
  delete state[taskId];
  saveState(state);
  renderTasks(currentFilter);
}

function markDone(taskId){
  const s = state[taskId] || {};
  s.done = !s.done;
  if(s.done) s.doneAt = new Date().toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  else delete s.doneAt;
  state[taskId] = s;
  saveState(state);
  renderTasks(currentFilter);
}

function filterTasks(filter, btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTasks(filter);
}

// 写入 commands.md，让小美下次对话时读取
function syncToCommands(taskId, task, s){
  // 仅做标记，实际写入由小美在对话时执行
  // 在 localStorage 中记录"有反馈待同步"标记
  const pending = JSON.parse(localStorage.getItem('kaiyuan_pending_sync')||'[]');
  const existing = pending.findIndex(p=>p.id===taskId);
  const record = { id:taskId, title:task.title, feedback:s, syncAt: new Date().toISOString() };
  if(existing>=0) pending[existing]=record; else pending.push(record);
  localStorage.setItem('kaiyuan_pending_sync', JSON.stringify(pending));
}

// 初始渲染
renderTasks('all');
</script>
</body>
</html>
